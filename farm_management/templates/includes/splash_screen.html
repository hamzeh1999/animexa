<style>
    /* شاشة Splash كاملة */
    .splash {
        position: fixed !important;
        inset: 0 !important;
        z-index: 10000 !important;

        display: flex !important;
        justify-content: center !important;
        align-items: center !important;

        width: 100vw !important;
        height: 100vh !important;
        margin: 0 !important;
        padding: 0 !important;

        background-color: #ffffff !important;
        overflow: hidden !important;
    }

    /*
     * غلاف الدخول.
     * تم فصله عن حركة الطفو لمنع تعارض transform بين الأنيميشنات.
     */
    .animexa-egg-entry {
        display: flex;
        justify-content: center;
        align-items: center;

        animation: animexaFadeIn 0.8s ease-out both;
    }

    /* تصميم البيضة الخارجي */
    .animexa-egg-card {
        position: relative;

        display: flex;
        justify-content: center;
        align-items: center;

        box-sizing: border-box;
        width: 350px;
        height: 460px;
        padding: 28px;

        background-color: #f9f9fa;

        border: 1px solid rgba(244, 247, 250, 0.9);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;

        box-shadow:
            0 20px 40px rgba(0, 0, 0, 0.12),
            0 8px 16px rgba(22, 142, 245, 0.05);

       
        overflow: hidden;

        animation: animexaFloat 4s ease-in-out infinite alternate;
        will-change: transform;
    }

    .animexa-egg-logo {
        display: block;

        width: 65%;
        max-width: none;
        height: auto;
        max-height: 45%;

        margin: 0;
        padding: 0;

        object-fit: contain;
        object-position: center;

        background: transparent !important;
        border: 0 !important;
        outline: 0 !important;
        box-shadow: none !important;

        /*
         */
        animation: animexaLogoBreath 3.5s ease-in-out infinite alternate;

        transform-origin: center;
        will-change: transform, filter;

        /*
         */
        filter: drop-shadow(0 8px 14px rgba(0, 120, 210, 0.12));

        user-select: none;
        pointer-events: none;
        -webkit-user-drag: none;
    }

    @keyframes animexaFadeIn {
        from {
            opacity: 0;
            transform: scale(0.88) translateY(18px);
        }

        to {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    }

    @keyframes animexaFloat {
        0% {
            transform: translateY(0);
        }

        100% {
            transform: translateY(-10px);
        }
    }

    @keyframes animexaLogoBreath {
        0% {
            transform: scale(0.97);
            filter:
                drop-shadow(0 7px 12px rgba(0, 120, 210, 0.10))
                brightness(1);
        }

        100% {
            transform: scale(1.035);
            filter:
                drop-shadow(0 11px 18px rgba(0, 160, 230, 0.18))
                brightness(1.04);
        }
    }

    @media (max-width: 767px) {
        .animexa-egg-card {
            width: min(82vw, 300px);
            height: min(112vw, 405px);
            padding: 20px;
        }

        .animexa-egg-logo {
            width: 20%;
            max-height: 20%;
        }
    }

    @media (max-width: 360px) {
        .animexa-egg-card {
            width: 260px;
            height: 355px;
            padding: 16px;
        }

        .animexa-egg-logo {
            width: 50%;
        }
    }

    @media (min-width: 1200px) {
        .animexa-egg-card {
            width: 390px;
            height: 520px;
        }

        .animexa-egg-logo {
            width: 88%;
        }
    }

    
</style>

<div class="splash">
    <div class="animexa-egg-entry">
        <div class="animexa-egg-card">

                <!-- /assets/farm_management/icons/desktop_icons/solid/designer.png -->
                <img src="/assets/farm_management/icons/desktop_icons/solid/splash.png" alt="Designer Icon">


        </div>
    </div>
</div>
